# ============================================================
# AI Daily Warmup — GitHub Actions Workflow
# ============================================================
# Supports variable-driven scheduling:
# - Repository variable WARMUP_TIMEZONE (IANA TZ, e.g. Asia/Shanghai)
# - Repository variable WARMUP_HOURS (CSV local hours, e.g. 8,13,18)
#
# GitHub schedule cron itself cannot read variables directly, so this workflow
# runs hourly and each job gates execution by local time derived from variables.
# ============================================================

name: AI Daily Warmup

on:
  schedule:
    - cron: '0 * * * *' # hourly gate check
  workflow_dispatch:

permissions:
  contents: read

env:
  WARMUP_TIMEZONE: ${{ vars.WARMUP_TIMEZONE || 'Asia/Shanghai' }}
  WARMUP_HOURS: ${{ vars.WARMUP_HOURS || '8,13,18' }}
  WARMUP_PROMPT: "${{ vars.WARMUP_PROMPT || 'Warmup. Use smallest available model. Reply: OK' }}"

jobs:
  warmup-claude:
    name: 🤖 Wake Up Claude
    runs-on: ubuntu-latest
    if: ${{ secrets.CLAUDE_SESSION != '' }}
    steps:
      - name: Check local schedule window
        id: schedule
        run: |
          set -euo pipefail
          hour="$(TZ="${WARMUP_TIMEZONE}" date +%H)"
          hour="$((10#${hour}))" # force base-10 to safely parse zero-padded hours like 08
          hours=",${WARMUP_HOURS// /},"
          if [[ "${hours}" == *",${hour},"* ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "[claude] run=true tz=${WARMUP_TIMEZONE} hour=${hour} hours=${WARMUP_HOURS}"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "[claude] run=false tz=${WARMUP_TIMEZONE} hour=${hour} hours=${WARMUP_HOURS}"
          fi

      - name: Install Claude CLI
        if: steps.schedule.outputs.should_run == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Checkout repository
        if: steps.schedule.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Run Claude warmup
        if: steps.schedule.outputs.should_run == 'true'
        env:
          CLAUDE_SESSION: ${{ secrets.CLAUDE_SESSION }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || '' }}
        run: bash ./scripts/warmup-claude.sh

  warmup-codex:
    name: 🤖 Wake Up Codex
    runs-on: ubuntu-latest
    if: ${{ secrets.CODEX_SESSION != '' }}
    steps:
      - name: Check local schedule window
        id: schedule
        run: |
          set -euo pipefail
          hour="$(TZ="${WARMUP_TIMEZONE}" date +%H)"
          hour="$((10#${hour}))" # force base-10 to safely parse zero-padded hours like 08
          hours=",${WARMUP_HOURS// /},"
          if [[ "${hours}" == *",${hour},"* ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "[codex] run=true tz=${WARMUP_TIMEZONE} hour=${hour} hours=${WARMUP_HOURS}"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "[codex] run=false tz=${WARMUP_TIMEZONE} hour=${hour} hours=${WARMUP_HOURS}"
          fi

      - name: Install Codex CLI
        if: steps.schedule.outputs.should_run == 'true'
        run: npm install -g @openai/codex

      - name: Checkout repository
        if: steps.schedule.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Run Codex warmup
        if: steps.schedule.outputs.should_run == 'true'
        env:
          CODEX_SESSION: ${{ secrets.CODEX_SESSION }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL || '' }}
        run: bash ./scripts/warmup-codex.sh

  warmup-gemini:
    name: 🤖 Wake Up Gemini
    runs-on: ubuntu-latest
    if: ${{ secrets.GEMINI_SESSION != '' }}
    steps:
      - name: Check local schedule window
        id: schedule
        run: |
          set -euo pipefail
          hour="$(TZ="${WARMUP_TIMEZONE}" date +%H)"
          hour="$((10#${hour}))" # force base-10 to safely parse zero-padded hours like 08
          hours=",${WARMUP_HOURS// /},"
          if [[ "${hours}" == *",${hour},"* ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "[gemini] run=true tz=${WARMUP_TIMEZONE} hour=${hour} hours=${WARMUP_HOURS}"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "[gemini] run=false tz=${WARMUP_TIMEZONE} hour=${hour} hours=${WARMUP_HOURS}"
          fi

      - name: Install Gemini CLI
        if: steps.schedule.outputs.should_run == 'true'
        run: npm install -g @google/gemini-cli

      - name: Checkout repository
        if: steps.schedule.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Run Gemini warmup
        if: steps.schedule.outputs.should_run == 'true'
        env:
          GEMINI_SESSION: ${{ secrets.GEMINI_SESSION }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || '' }}
        run: bash ./scripts/warmup-gemini.sh
