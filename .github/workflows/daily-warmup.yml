# ============================================================
# AI Daily Warmup — GitHub Actions Workflow
# ============================================================
# Variable-driven scheduling with runtime-budget optimization:
# - Hourly trigger
# - One tiny gate job decides whether to run this hour
# - Provider jobs run only when gate=true and secret exists
# ============================================================

name: AI Daily Warmup

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-daily-warmup-${{ github.ref }}
  cancel-in-progress: true

env:
  WARMUP_TIMEZONE: ${{ vars.WARMUP_TIMEZONE || 'Asia/Shanghai' }}
  WARMUP_HOURS: ${{ vars.WARMUP_HOURS || '8,13,18' }}
  WARMUP_PROMPT: "${{ vars.WARMUP_PROMPT || 'Warmup. Use smallest available model. Reply: OK' }}"

jobs:
  schedule-gate:
    name: ⏱️ Schedule Gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.schedule.outputs.should_run }}
      has_claude: ${{ steps.providers.outputs.has_claude }}
      has_codex: ${{ steps.providers.outputs.has_codex }}
      has_gemini: ${{ steps.providers.outputs.has_gemini }}
    steps:
      - name: Detect configured providers
        id: providers
        env:
          CLAUDE_SESSION: ${{ secrets.CLAUDE_SESSION }}
          CODEX_SESSION: ${{ secrets.CODEX_SESSION }}
          GEMINI_SESSION: ${{ secrets.GEMINI_SESSION }}
        run: |
          set -euo pipefail
          [[ -n "${CLAUDE_SESSION:-}" ]] && echo "has_claude=true" >> "$GITHUB_OUTPUT" || echo "has_claude=false" >> "$GITHUB_OUTPUT"
          [[ -n "${CODEX_SESSION:-}" ]] && echo "has_codex=true" >> "$GITHUB_OUTPUT" || echo "has_codex=false" >> "$GITHUB_OUTPUT"
          [[ -n "${GEMINI_SESSION:-}" ]] && echo "has_gemini=true" >> "$GITHUB_OUTPUT" || echo "has_gemini=false" >> "$GITHUB_OUTPUT"

      - name: Check local schedule window
        id: schedule
        run: |
          set -euo pipefail
          hour="$(TZ="${WARMUP_TIMEZONE}" date +%H)"
          hour="$((10#${hour}))" # force base-10 to safely parse zero-padded hours like 08
          hours=",${WARMUP_HOURS// /},"
          if [[ "${hours}" == *",${hour},"* ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "[gate] run=true tz=${WARMUP_TIMEZONE} hour=${hour} hours=${WARMUP_HOURS}"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "[gate] run=false tz=${WARMUP_TIMEZONE} hour=${hour} hours=${WARMUP_HOURS}"
          fi

  warmup-claude:
    name: 🤖 Wake Up Claude
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: schedule-gate
    if: ${{ needs.schedule-gate.outputs.should_run == 'true' && needs.schedule-gate.outputs.has_claude == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude warmup
        env:
          CLAUDE_SESSION: ${{ secrets.CLAUDE_SESSION }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || '' }}
        run: bash ./scripts/warmup-claude.sh

  warmup-codex:
    name: 🤖 Wake Up Codex
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: schedule-gate
    if: ${{ needs.schedule-gate.outputs.should_run == 'true' && needs.schedule-gate.outputs.has_codex == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex warmup
        env:
          CODEX_SESSION: ${{ secrets.CODEX_SESSION }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL || '' }}
        run: bash ./scripts/warmup-codex.sh

  warmup-gemini:
    name: �� Wake Up Gemini
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: schedule-gate
    if: ${{ needs.schedule-gate.outputs.should_run == 'true' && needs.schedule-gate.outputs.has_gemini == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Run Gemini warmup
        env:
          GEMINI_SESSION: ${{ secrets.GEMINI_SESSION }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || '' }}
        run: bash ./scripts/warmup-gemini.sh
